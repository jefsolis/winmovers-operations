name: Build and deploy container to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run database migration
        continue-on-error: true
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm ci
          npx prisma db push --accept-data-loss --skip-generate

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to ACR (Docker)
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_APP_ID }}
          password: ${{ secrets.AZURE_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/winmovers-ops:latest
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Azure CLI - update Web App container
        uses: azure/cli@v1
        with:
          azcliversion: 'latest'
          inlineScript: |
            az login --service-principal -u ${{ secrets.AZURE_APP_ID }} -p ${{ secrets.AZURE_PASSWORD }} --tenant ${{ secrets.AZURE_TENANT }}
            az webapp config container set --resource-group Sistema --name winmoversops-app --container-image-name ${{ secrets.ACR_NAME }}.azurecr.io/winmovers-ops:latest
            az webapp restart --resource-group Sistema --name winmoversops-app

  